# Air config for live-reloading Go backend (https://github.com/air-verse/air)
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server.exe ./cmd/server"
  bin = "tmp/server.exe"
  include = ["cmd", "internal"]
  exclude_dir = ["tmp", ".git", "docs"]

[log]
  time = true
  color = true

[dev]
  include_dir = ["cmd", "internal"]
  exclude_dir = ["tmp", ".git", "docs"]
  stop_on_error = false
  delay = 1000
